  server {
            listen 80;
            listen 443 ssl;
            server_name  www.leczcore.com;
    	   	  ssl_certificate      /usr/crt_lecz/Nginx/STAR_leczcore_com_integrated.crt; # 这里我是绝对路径
            ssl_certificate_key  /usr/crt_lecz/Nginx/STAR_leczcore_com.key;  # 这里我是绝对路径
            ssl_session_cache shared:SSL:1m; ssl_session_timeout 5m;
    	       ssl_ciphers HIGH:!aNULL:!MD5;
    	       ssl_prefer_server_ciphers on;
            #charset koi8-r;

            #access_log  logs/host.access.log  main;

    		location / {
                        root  /usr/lecz/production/vue/leczcore/;
            		    index  index.html index.htm;
